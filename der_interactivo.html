<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RUAT – Diagrama E-R Interactivo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; overflow: hidden; user-select: none; }

/* ── TOOLBAR ── */
#toolbar {
  position: fixed; top: 0; left: 0; right: 0; height: 48px;
  background: #1a1a2e; color: #eee;
  display: flex; align-items: center; gap: 10px; padding: 0 18px;
  z-index: 200; box-shadow: 0 2px 8px #0005;
}
#toolbar h1 { font-size: .95rem; font-weight: 600; letter-spacing: .03em; color: #fff; white-space: nowrap; }
#toolbar .sep { width: 1px; height: 24px; background: #ffffff22; flex-shrink: 0; }
.tb-btn {
  padding: 5px 13px; border-radius: 6px; border: 1px solid #ffffff22;
  background: transparent; color: #ccc; cursor: pointer; font-size: .8rem;
  transition: background .15s, color .15s, border-color .15s; white-space: nowrap;
}
.tb-btn:hover { background: #ffffff18; color: #fff; }
.tb-btn.active { background: #4f8ef7; color: #fff; border-color: #4f8ef7; }
.tb-btn.saved  { background: #22c55e !important; color: #fff !important; border-color: #22c55e !important; }
#toolbar .spacer { flex: 1; }
.legend { display: flex; gap: 14px; align-items: center; font-size: .76rem; color: #aaa; flex-shrink: 0; }
.leg { display: flex; align-items: center; gap: 5px; }
.leg-diamond { width: 12px; height: 12px; transform: rotate(45deg); border: 2px solid; }

/* ── CANVAS ── */
#canvas {
  position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
  overflow: hidden; cursor: grab;
}
#canvas.grabbing { cursor: grabbing; }
#world { position: absolute; width: 3000px; height: 2000px; }

/* ── SVG ARROWS ── */
#svg-layer {
  position: absolute; top: 0; left: 0;
  width: 3000px; height: 2000px;
  pointer-events: none;
}

/* ── ENTITY BOXES ── */
.entity {
  position: absolute; min-width: 160px;
  border-radius: 6px; border: 2px solid #334;
  background: #fff; cursor: grab;
  box-shadow: 0 3px 12px #0001;
  transition: box-shadow .18s, border-color .18s;
  z-index: 10;
}
.entity:active { cursor: grabbing; z-index: 50; }
.entity.selected { border-color: #4f8ef7; box-shadow: 0 0 0 3px #4f8ef740, 0 4px 16px #0002; }
.entity.related  { border-color: #7c5cfc; box-shadow: 0 0 0 2px #7c5cfc30; }
.entity.dim      { opacity: .3; }

.entity-header {
  background: #1a1a2e; color: #fff;
  padding: 7px 12px; font-size: .82rem; font-weight: 700;
  border-radius: 4px 4px 0 0; letter-spacing: .04em;
  text-transform: uppercase;
}
.entity.selected .entity-header { background: #4f8ef7; }
.entity.related  .entity-header { background: #7c5cfc; }

.entity-attrs { padding: 6px 0; }
.attr-row {
  padding: 3px 12px; font-size: .76rem; color: #333;
  display: flex; align-items: center; gap: 5px;
}
.attr-name { flex: 1; }
.attr-name.pk { text-decoration: underline; font-weight: 600; }
.attr-name.fk { text-decoration: underline; text-decoration-style: dashed; }

/* ── RELATIONSHIP DIAMOND NODES ── */
.rel-node {
  position: absolute; cursor: grab; z-index: 15;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center;
}
.rel-node:active { cursor: grabbing; z-index: 55; }

/* SVG diamond poly colors via class */
.rel-node .d-poly          { fill: #fff; stroke: #6b7280; stroke-width: 2; }
.rel-node .d-text          { fill: #374151; font-size: 10px; font-weight: 600; font-family: Arial,sans-serif; }
.rel-node.selected .d-poly { fill: #eff6ff; stroke: #4f8ef7; }
.rel-node.selected .d-text { fill: #1d4ed8; }
.rel-node.rel-ternary .d-poly  { stroke: #7c3aed; }
.rel-node.rel-ternary .d-text  { fill: #5b21b6; }
.rel-node.rel-ternary.selected .d-poly { fill: #f5f3ff; stroke: #7c3aed; }

/* ── INFO PANEL ── */
#info-panel {
  position: fixed; top: 56px; right: 12px; width: 270px;
  background: #fff; border-radius: 10px; border: 1px solid #dde;
  box-shadow: 0 4px 20px #0002; padding: 0; overflow: hidden;
  z-index: 100; transition: opacity .2s;
}
#info-panel.hidden { opacity: 0; pointer-events: none; }
#info-header {
  background: #1a1a2e; color: #fff; padding: 10px 14px;
  font-size: .82rem; font-weight: 700; text-transform: uppercase;
}
#info-body { padding: 12px 14px; font-size: .8rem; color: #333; }
.info-section { margin-bottom: 10px; }
.info-label { font-size: .68rem; font-weight: 700; text-transform: uppercase;
              color: #999; margin-bottom: 4px; letter-spacing: .06em; }
.info-rel-tag {
  display: inline-block; background: #f0f0ff; color: #4f8ef7;
  border-radius: 4px; padding: 2px 8px; margin: 2px 3px 2px 0;
  font-size: .72rem; cursor: pointer; border: 1px solid #c7d7ff;
}
.info-rel-tag:hover { background: #dce8ff; }

/* ── ZOOM HUD ── */
#zoom-hud {
  position: fixed; bottom: 12px; left: 50%;
  transform: translateX(-50%);
  background: #1a1a2ecc; color: #fff;
  border-radius: 8px; padding: 5px 14px;
  font-size: .78rem; z-index: 100;
  display: flex; align-items: center; gap: 10px;
}
#zoom-hud button {
  background: none; border: 1px solid #ffffff44; color: #fff;
  width: 22px; height: 22px; border-radius: 4px; cursor: pointer;
  font-size: 1rem; line-height: 1;
}
#zoom-hud button:hover { background: #ffffff22; }

/* ── SAVE TOAST ── */
#save-toast {
  position: fixed; bottom: 55px; left: 50%; transform: translateX(-50%);
  background: #22c55e; color: #fff; padding: 6px 20px;
  border-radius: 20px; font-size: .82rem; font-weight: 600;
  z-index: 300; opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
#save-toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <h1>🗃 RUAT — Diagrama E-R Interactivo</h1>
  <div class="sep"></div>
  <button class="tb-btn" onclick="saveLayout()" id="btn-save">💾 Guardar layout</button>
  <button class="tb-btn" onclick="resetLayout()">↺ Resetear layout</button>
  <button class="tb-btn" onclick="clearSelection()">✕ Deseleccionar</button>
  <button class="tb-btn" id="btn-attrs" onclick="toggleAttrs()">Ocultar atributos</button>
  <div class="spacer"></div>
  <div class="legend">
    <div class="leg"><div style="width:12px;height:12px;background:#1a1a2e;border-radius:2px"></div>Entidad</div>
    <div class="leg"><div class="leg-diamond" style="border-color:#6b7280"></div>Rel. binaria</div>
    <div class="leg"><div class="leg-diamond" style="border-color:#7c3aed"></div>Rel. ternaria</div>
    <div class="leg" style="font-size:.74rem">→ = cardinalidad 1 &nbsp;|&nbsp; — = N &nbsp;|&nbsp; ═ = participación total &nbsp;|&nbsp; — = participación parcial</div>
  </div>
</div>

<!-- CANVAS -->
<div id="canvas">
  <div id="world">
    <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-n"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
        </marker>
        <marker id="arr-1"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="#4f8ef7" stroke="#4f8ef7" stroke-width="1.2"/>
        </marker>
        <marker id="arr-hl"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="#4f8ef7" stroke="#4f8ef7" stroke-width="1.2"/>
        </marker>
        <marker id="arr-t"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="#7c3aed" stroke="#7c3aed" stroke-width="1.2"/>
        </marker>
      </defs>
      <g id="arrows-layer"></g>
    </svg>
  </div>
</div>

<!-- INFO PANEL -->
<div id="info-panel" class="hidden">
  <div id="info-header">—</div>
  <div id="info-body"></div>
</div>

<!-- ZOOM HUD -->
<div id="zoom-hud">
  <button onclick="zoom(-0.1)">−</button>
  <span id="zoom-label">100%</span>
  <button onclick="zoom(+0.1)">+</button>
</div>

<!-- SAVE TOAST -->
<div id="save-toast">✓ Layout guardado</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════════════
const ENTITIES = {

      { name: 'nro_licencia',      type: 'VARCHAR' },
      { name: 'clase',             type: 'VARCHAR' },

      { name: 'fecha_vencimiento', type: 'DATE' },
      { name: 'estado',            type: 'VARCHAR' },
    ]
  },
  INFRACCION: {
    x: 360, y: 980,
    attrs: [
      { name: 'id_infraccion',   type: 'SERIAL',  pk: true },
      { name: 'id_persona',      type: 'INTEGER', fk: 'PERSONA' },
      { name: 'fecha',           type: 'DATE' },
      { name: 'tipo_infraccion', type: 'VARCHAR' },
      { name: 'descripcion',     type: 'VARCHAR' },
      { name: 'jurisdiccion',    type: 'VARCHAR' },
      { name: 'monto',           type: 'NUMERIC' },
      { name: 'estado',          type: 'VARCHAR' },
    ]
  },
  ANTECEDENTE_PENAL: {
    x: 660, y: 980,
    attrs: [
      { name: 'id_antecedente', type: 'SERIAL',  pk: true },
      { name: 'id_persona',     type: 'INTEGER', fk: 'PERSONA' },
      { name: 'fecha',          type: 'DATE' },

};

// partFrom/partTo: 'T' = total (doble línea = entidad requerida), 'P' = parcial (línea simple)
// Convención: doble línea en la entidad que DEBE EXISTIR para que la relación sea válida.
// Decisiones de diseño marcadas con [*] — comunicar en informe.
const BINARY_RELS = [
  { id: 'OCURRE_EN',       label: ['ocurre', 'en'],
    from: 'SINIESTRO', to: 'TRAMO_VIAL',
    cardFrom: 'N', cardTo: '1',
    // Siniestro requiere tramo → doble línea en TRAMO. Tramo puede tener 0 siniestros → simple en SINIESTRO.
    partFrom: 'P', partTo: 'T',
    attrs: [],
    x: 420, y: 240 },

  { id: 'GENERA',          label: ['genera'],
    from: 'SINIESTRO', to: 'INFORME_TECNICO',
    cardFrom: '1', cardTo: 'N',
    // Informe requiere siniestro → doble línea + flecha en SINIESTRO.
    // [*] ¿Puede existir siniestro sin informe técnico? → asumimos que sí (parcial en INFORME).
    partFrom: 'T', partTo: 'P',
    attrs: [],
    x: 990, y: 240 },

  { id: 'VEHICULO_INVOLUCRADO', label: ['vehículo', 'involucrado'],
    from: 'SINIESTRO', to: 'VEHICULO',
    cardFrom: 'N', cardTo: 'N',
    // Siniestro requiere al menos un vehículo → doble línea en VEHICULO.
    // Vehículo puede no haber estado en accidentes → simple en SINIESTRO.
    partFrom: 'P', partTo: 'T',
    attrs: ['danio_material', 'observaciones'],
    x: 870, y: 490 },

  { id: 'TESTIMONIO',      label: ['testimonio'],
    from: 'SINIESTRO', to: 'PERSONA',
    cardFrom: 'N', cardTo: 'N',
    // Ninguna de las dos partes es obligatoria en esta relación.
    partFrom: 'P', partTo: 'P',
    attrs: ['declaracion', 'medio_contacto'],
    x: 560, y: 460 },

  { id: 'VICTIMA_NO_VEHICULAR', label: ['víctima no', 'vehicular'],
    from: 'SINIESTRO', to: 'PERSONA',
    cardFrom: 'N', cardTo: 'N',
    // [*] No todo siniestro tiene víctima peatonal, no toda persona es víctima.
    partFrom: 'P', partTo: 'P',
    attrs: ['tipo_victima', 'condicion_fisica', 'observaciones'],
    x: 460, y: 530 },

  { id: 'HABILITACION_CONDUCCION', label: ['habilitación', 'conductor'],
    from: 'PERSONA', to: 'VEHICULO',
    cardFrom: 'N', cardTo: 'N',
    // Ambas partes opcionales en esta relación.
    partFrom: 'P', partTo: 'P',
    attrs: ['fecha_desde', 'fecha_hasta'],
    x: 700, y: 760 },

  { id: 'POSEE_LICENCIA',  label: ['posee'],
    from: 'PERSONA', to: 'LICENCIA',
    cardFrom: '1', cardTo: 'N',
    // Licencia requiere persona → doble línea + flecha en PERSONA.
    // [*] ¿Toda persona tiene licencia? → asumimos que no (parcial en LICENCIA).
    partFrom: 'T', partTo: 'P',
    attrs: [],
    x: 200, y: 840 },

  { id: 'REGISTRA',        label: ['registra'],
    from: 'PERSONA', to: 'INFRACCION',
    cardFrom: '1', cardTo: 'N',
    // Infracción requiere persona → doble línea + flecha en PERSONA.
    // No toda persona tiene infracciones → simple en INFRACCION.
    partFrom: 'T', partTo: 'P',
    attrs: [],
    x: 360, y: 850 },

  { id: 'POSEE_ANTECEDENTE', label: ['posee', 'antecedente'],
    from: 'PERSONA', to: 'ANTECEDENTE_PENAL',
    cardFrom: '1', cardTo: 'N',
    // Antecedente requiere persona → doble línea + flecha en PERSONA.
    partFrom: 'T', partTo: 'P',
    attrs: [],
    x: 520, y: 840 },

  { id: 'ASEGURADO_POR',   label: ['asegurado', 'por'],
    from: 'VEHICULO', to: 'ASEGURADORA',
    cardFrom: 'N', cardTo: '1',
    // Vehículo requiere aseguradora → doble línea + flecha en ASEGURADORA.
    // [*] ¿Puede registrarse vehículo sin aseguradora? → asumimos que no.
    partFrom: 'P', partTo: 'T',
    attrs: [],
    x: 1220, y: 710 },
];

const TERNARY_RELS = [
  {
    id: 'PARTICIPACION_VEHICULAR', label: ['participación', 'vehicular'],
    entities: ['SINIESTRO', 'PERSONA', 'VEHICULO'],
    cards:    ['N', 'N', 'N'],
    parts:    ['T', 'P', 'P'],
    attrs: ['rol_ocupante', 'usa_cinturon', 'condicion_fisica', 'resultado'],
    x: 700, y: 570,
  }
];

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let selectedId = null;
let showAttrs  = true;
let scale      = 1;
let panX = 0, panY = 0;
let isPanning  = false;
let panStart   = { x: 0, y: 0 };

const entityPos = {};
const relPos    = {};

const STORAGE_KEY = 'ruat_der_layout_v1';

// Diamond dimensions
const DW = 120, DH = 62;   // width, height of diamond SVG
const DCX = DW / 2, DCY = DH / 2;  // center

// ═══════════════════════════════════════════════════════════════
// BUILD DOM — ENTITIES
// ═══════════════════════════════════════════════════════════════
function buildEntities() {
  const world = document.getElementById('world');
  Object.entries(ENTITIES).forEach(([id, def]) => {
    entityPos[id] = { x: def.x, y: def.y };
    const el = document.createElement('div');
    el.className = 'entity';
    el.id = 'ent-' + id;
    el.innerHTML = `
      <div class="entity-header">${id.replace(/_/g,' ')}</div>
      <div class="entity-attrs">
        ${def.attrs.map(a => `
          <div class="attr-row">
            <span class="attr-name ${a.pk ? 'pk' : a.fk ? 'fk' : ''}">${a.name}</span>
          </div>`).join('')}
      </div>`;
    el.style.left = def.x + 'px';
    el.style.top  = def.y + 'px';
    makeDraggable(el, id, 'entity');
    el.addEventListener('click', e => { e.stopPropagation(); selectItem(id); });
    world.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════════
// BUILD DOM — RELATIONSHIP DIAMOND NODES
// ═══════════════════════════════════════════════════════════════
function makeDiamondSVG(lines, isTernary) {
  // Diamond polygon points (leave 2px margin)
  const pts = `${DCX},2 ${DW-2},${DCY} ${DCX},${DH-2} 2,${DCY}`;
  const lineH = 13;
  const totalH = lines.length * lineH;
  const startY = DCY - totalH / 2 + lineH * 0.75;
  const textEls = lines.map((line, i) =>
    `<text class="d-text" x="${DCX}" y="${startY + i * lineH}" text-anchor="middle">${line}</text>`
  ).join('');
  return `<svg class="diamond-svg" xmlns="http://www.w3.org/2000/svg"
    width="${DW}" height="${DH}" viewBox="0 0 ${DW} ${DH}" style="display:block;overflow:visible">
    <polygon class="d-poly" points="${pts}"/>
    ${textEls}
  </svg>`;
}

function buildRelNodes() {
  const world = document.getElementById('world');
  [...BINARY_RELS, ...TERNARY_RELS].forEach(rel => {
    relPos[rel.id] = { x: rel.x, y: rel.y };
    const isTernary = !!TERNARY_RELS.find(r => r.id === rel.id);
    const el = document.createElement('div');
    el.className = 'rel-node' + (isTernary ? ' rel-ternary' : '');
    el.id = 'rel-' + rel.id;
    el.style.left = rel.x + 'px';
    el.style.top  = rel.y + 'px';
    el.innerHTML = makeDiamondSVG(rel.label, isTernary);
    makeDraggable(el, rel.id, 'rel');
    el.addEventListener('click', e => { e.stopPropagation(); selectItem(rel.id); });
    world.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════════
// DRAG
// ═══════════════════════════════════════════════════════════════
function makeDraggable(el, id, kind) {
  let ox, oy, dragging = false;
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.stopPropagation();
    dragging = true;
    const pos = kind === 'entity' ? entityPos[id] : relPos[id];
    ox = e.clientX / scale - pos.x;
    oy = e.clientY / scale - pos.y;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  function onMove(e) {
    if (!dragging) return;
    const nx = e.clientX / scale - ox;
    const ny = e.clientY / scale - oy;
    if (kind === 'entity') {
      entityPos[id] = { x: nx, y: ny };
    } else {
      relPos[id] = { x: nx, y: ny };
    }
    el.style.left = nx + 'px';
    el.style.top  = ny + 'px';
    drawArrows();
  }
  function onUp() {
    dragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
}

// ═══════════════════════════════════════════════════════════════
// ARROWS
// ═══════════════════════════════════════════════════════════════
function getEntityCenter(id) {
  const el = document.getElementById('ent-' + id);
  const p  = entityPos[id];
  if (!el) return p || { x: 0, y: 0 };
  return { x: p.x + el.offsetWidth / 2, y: p.y + el.offsetHeight / 2 };
}

function getRelCenter(id) {
  return relPos[id] || { x: 0, y: 0 };
}

function clampToBox(center, target, entId) {
  const el = document.getElementById('ent-' + entId);
  if (!el) return center;
  const p = entityPos[entId];
  const w = el.offsetWidth, h = el.offsetHeight;
  const dx = target.x - center.x, dy = target.y - center.y;
  if (dx === 0 && dy === 0) return center;
  let tMin = Infinity;
  if (dx > 0) tMin = Math.min(tMin, (p.x + w - center.x) / dx);
  if (dx < 0) tMin = Math.min(tMin, (p.x     - center.x) / dx);
  if (dy > 0) tMin = Math.min(tMin, (p.y + h - center.y) / dy);
  if (dy < 0) tMin = Math.min(tMin, (p.y     - center.y) / dy);
  tMin = Math.max(0, Math.min(tMin, 1));
  return { x: center.x + dx * tMin, y: center.y + dy * tMin };
}

function midpoint(a, b, t = 0.5) {
  return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
}

function makeLine(a, b, color, sw, markerEnd) {
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
  line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', sw);
  if (markerEnd && markerEnd !== 'none') line.setAttribute('marker-end', markerEnd);
  return line;
}

// Draws a segment from a→b. If isTotal, draws two parallel lines (total participation).
// If hasArrow, puts arrowhead at b end (cardinality 1).
function drawSegment(layer, a, b, color, sw, isTotal, hasArrow, markerSuffix) {
  const marker = hasArrow ? `url(#arr-${markerSuffix})` : 'none';
  if (isTotal) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const ox = -dy / len * 3, oy = dx / len * 3;
    const l1 = makeLine({x: a.x+ox, y: a.y+oy}, {x: b.x+ox, y: b.y+oy}, color, sw, 'none');
    const l2 = makeLine({x: a.x-ox, y: a.y-oy}, {x: b.x-ox, y: b.y-oy}, color, sw, marker);
    layer.appendChild(l1);
    layer.appendChild(l2);
  } else {
    layer.appendChild(makeLine(a, b, color, sw, marker));
  }
}

function addAttrLabels(layer, rc, attrs, color) {
  // Attrs appear BELOW the diamond center
  // Diamond half-height = DCY (31px), add 6px gap
  const startY = rc.y + DCY + 6;
  attrs.forEach((attr, i) => {
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', rc.x);
    txt.setAttribute('y', startY + i * 13);
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('font-size', '9');
    txt.setAttribute('fill', color);
    txt.setAttribute('font-style', 'italic');
    txt.setAttribute('font-family', 'Arial,sans-serif');
    txt.textContent = attr;
    layer.appendChild(txt);
  });
}

function isRelHighlighted(relId) {
  if (!selectedId) return false;
  const rel = [...BINARY_RELS, ...TERNARY_RELS].find(r => r.id === relId);
  if (!rel) return false;
  const ents = rel.entities || [rel.from, rel.to];
  return ents.includes(selectedId) || rel.id === selectedId;
}

function drawArrows() {
  const layer = document.getElementById('arrows-layer');
  layer.innerHTML = '';

  // Binary relationships
  BINARY_RELS.forEach(rel => {
    const rc   = getRelCenter(rel.id);
    const fc   = getEntityCenter(rel.from);
    const tc   = getEntityCenter(rel.to);
    const fp   = clampToBox(fc, rc, rel.from);
    const tp   = clampToBox(tc, rc, rel.to);
    const isHl  = isRelHighlighted(rel.id);
    const color = isHl ? '#4f8ef7' : '#94a3b8';
    const sw    = isHl ? '2' : '1.4';
    const msuf  = isHl ? 'hl' : '1';

    // FROM side: draw rc→fp so arrowhead lands at entity when card=1
    drawSegment(layer, rc, fp, color, sw,
      rel.partFrom === 'T', rel.cardFrom === '1', msuf);

    // TO side: draw rc→tp, arrowhead at entity when card=1
    drawSegment(layer, rc, tp, color, sw,
      rel.partTo === 'T', rel.cardTo === '1', msuf);

    if (rel.attrs.length) {
      addAttrLabels(layer, rc, rel.attrs, isHl ? '#6b9df7' : '#9ca3af');
    }
  });

  // Ternary relationships
  TERNARY_RELS.forEach(rel => {
    const rc   = getRelCenter(rel.id);
    const isHl = isRelHighlighted(rel.id);
    const color = isHl ? '#7c3aed' : '#a78bfa';
    const sw    = isHl ? '2' : '1.4';
    const msuf  = isHl ? 't' : 't';

    rel.entities.forEach((entId, i) => {
      const ec = getEntityCenter(entId);
      const ep = clampToBox(ec, rc, entId);
      const isTotal = rel.parts ? rel.parts[i] === 'T' : false;
      const card1   = rel.cards[i] === '1';
      drawSegment(layer, rc, ep, color, sw, isTotal, card1, msuf);
    });

    if (rel.attrs.length) {
      addAttrLabels(layer, rc, rel.attrs, isHl ? '#7c3aed' : '#a78bfa');
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// SELECTION & HIGHLIGHTS
// ═══════════════════════════════════════════════════════════════
function selectItem(id) {
  selectedId = (selectedId === id) ? null : id;
  updateHighlights();
  updateInfoPanel();
}

function clearSelection() {
  selectedId = null;
  updateHighlights();
  updateInfoPanel();
}

function updateHighlights() {
  let relatedEnts = new Set();
  let relatedRels = new Set();

  if (selectedId) {
    [...BINARY_RELS, ...TERNARY_RELS].forEach(rel => {
      const ents = rel.entities || [rel.from, rel.to];
      if (ents.includes(selectedId)) {
        relatedRels.add(rel.id);
        ents.forEach(e => { if (e !== selectedId) relatedEnts.add(e); });
      }
      if (rel.id === selectedId) {
        relatedRels.add(rel.id);
        ents.forEach(e => relatedEnts.add(e));
      }
    });
  }

  Object.keys(ENTITIES).forEach(id => {
    const el = document.getElementById('ent-' + id);
    el.classList.remove('selected', 'related', 'dim');
    if (!selectedId) return;
    if (id === selectedId)        el.classList.add('selected');
    else if (relatedEnts.has(id)) el.classList.add('related');
    else                          el.classList.add('dim');
  });

  [...BINARY_RELS, ...TERNARY_RELS].forEach(rel => {
    const el = document.getElementById('rel-' + rel.id);
    el.classList.remove('selected');
    if (selectedId && (rel.id === selectedId || relatedRels.has(rel.id)))
      el.classList.add('selected');
  });

  drawArrows();
}

function updateInfoPanel() {
  const panel  = document.getElementById('info-panel');
  const header = document.getElementById('info-header');
  const body   = document.getElementById('info-body');

  if (!selectedId) { panel.classList.add('hidden'); return; }
  panel.classList.remove('hidden');

  const entDef = ENTITIES[selectedId];
  if (entDef) {
    header.textContent = selectedId.replace(/_/g, ' ');
    const rels = [...BINARY_RELS, ...TERNARY_RELS].filter(r => {
      const ents = r.entities || [r.from, r.to];
      return ents.includes(selectedId);
    });
    const pk = entDef.attrs.find(a => a.pk);
    body.innerHTML = `
      <div class="info-section">
        <div class="info-label">Clave primaria</div>
        <div style="font-family:monospace;font-size:.78rem">${pk ? pk.name : '—'}</div>
      </div>
      <div class="info-section">
        <div class="info-label">Atributos (${entDef.attrs.length})</div>
        <div style="font-family:monospace;font-size:.75rem;color:#555">
          ${entDef.attrs.map(a =>
            `<span style="display:block">${a.pk?'<u>':''}${a.name}${a.pk?'</u>':''} <i style="color:#aaa">${a.type}</i></span>`
          ).join('')}
        </div>
      </div>
      <div class="info-section">
        <div class="info-label">Interrelaciones (${rels.length})</div>
        ${rels.map(r =>
          `<span class="info-rel-tag" onclick="selectItem('${r.id}')">${r.label.join(' ')}</span>`
        ).join('')}
      </div>`;
    return;
  }

  const rel = [...BINARY_RELS, ...TERNARY_RELS].find(r => r.id === selectedId);
  if (rel) {
    header.textContent = rel.label.join(' ').toUpperCase();
    const ents  = rel.entities || [rel.from, rel.to];
    const cards = rel.cards    || [rel.cardFrom, rel.cardTo];
    body.innerHTML = `
      <div class="info-section">
        <div class="info-label">Tipo</div>
        <div>${ents.length === 3 ? 'Ternaria (3 entidades)' : 'Binaria'}</div>
      </div>
      <div class="info-section">
        <div class="info-label">Entidades participantes</div>
        ${ents.map((e, i) =>
          `<span class="info-rel-tag" onclick="selectItem('${e}')">${e.replace(/_/g,' ')} <b>(${cards[i]})</b></span>`
        ).join('')}
      </div>
      ${rel.attrs && rel.attrs.length ? `
      <div class="info-section">
        <div class="info-label">Atributos propios</div>
        <div style="font-family:monospace;font-size:.75rem;color:#666">
          ${rel.attrs.map(a => `<span style="display:block">${a}</span>`).join('')}
        </div>
      </div>` : ''}`;
  }
}

// ═══════════════════════════════════════════════════════════════
// CANVAS PAN & ZOOM
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const world  = document.getElementById('world');

canvas.addEventListener('mousedown', e => {
  if (e.target !== canvas && e.target.id !== 'world' && e.target.id !== 'svg-layer'
      && !e.target.closest('#svg-layer')) return;
  isPanning = true;
  panStart  = { x: e.clientX - panX, y: e.clientY - panY };
  canvas.classList.add('grabbing');
  clearSelection();
});
document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = e.clientX - panStart.x;
  panY = e.clientY - panStart.y;
  applyTransform();
});
document.addEventListener('mouseup', () => { isPanning = false; canvas.classList.remove('grabbing'); });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 0.08 : -0.08);
}, { passive: false });

function zoom(delta) {
  scale = Math.max(0.3, Math.min(2.5, scale + delta));
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
  applyTransform();
}

function applyTransform() {
  world.style.transform      = `translate(${panX}px, ${panY}px) scale(${scale})`;
  world.style.transformOrigin = '0 0';
}

// ═══════════════════════════════════════════════════════════════
// LAYOUT SAVE / LOAD / RESET
// ═══════════════════════════════════════════════════════════════
function saveLayout() {
  const data = {
    entityPos: JSON.parse(JSON.stringify(entityPos)),
    relPos:    JSON.parse(JSON.stringify(relPos)),
    panX, panY, scale
  };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    // Visual feedback
    const btn = document.getElementById('btn-save');
    btn.classList.add('saved');
    btn.textContent = '✓ Guardado';
    const toast = document.getElementById('save-toast');
    toast.classList.add('show');
    setTimeout(() => {
      btn.classList.remove('saved');
      btn.textContent = '💾 Guardar layout';
      toast.classList.remove('show');
    }, 1800);
  } catch(e) {
    alert('No se pudo guardar el layout en localStorage.');
  }
}

function loadSavedLayout() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);

    if (data.entityPos) {
      Object.entries(data.entityPos).forEach(([id, pos]) => {
        if (!entityPos[id]) return;
        entityPos[id] = pos;
        const el = document.getElementById('ent-' + id);
        if (el) { el.style.left = pos.x + 'px'; el.style.top = pos.y + 'px'; }
      });
    }
    if (data.relPos) {
      Object.entries(data.relPos).forEach(([id, pos]) => {
        if (!relPos[id]) return;
        relPos[id] = pos;
        const el = document.getElementById('rel-' + id);
        if (el) { el.style.left = pos.x + 'px'; el.style.top = pos.y + 'px'; }
      });
    }
    if (data.panX   !== undefined) panX  = data.panX;
    if (data.panY   !== undefined) panY  = data.panY;
    if (data.scale  !== undefined) scale = data.scale;
    document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
    applyTransform();
    drawArrows();
    return true;
  } catch(e) {
    console.warn('Error al cargar layout guardado:', e);
    return false;
  }
}

function resetLayout() {
  localStorage.removeItem(STORAGE_KEY);
  Object.entries(ENTITIES).forEach(([id, def]) => {
    entityPos[id] = { x: def.x, y: def.y };
    const el = document.getElementById('ent-' + id);
    if (el) { el.style.left = def.x + 'px'; el.style.top = def.y + 'px'; }
  });
  [...BINARY_RELS, ...TERNARY_RELS].forEach(rel => {
    relPos[rel.id] = { x: rel.x, y: rel.y };
    const el = document.getElementById('rel-' + rel.id);
    if (el) { el.style.left = rel.x + 'px'; el.style.top = rel.y + 'px'; }
  });
  panX = 80; panY = 20; scale = 1;
  document.getElementById('zoom-label').textContent = '100%';
  applyTransform();
  drawArrows();
}

function toggleAttrs() {
  showAttrs = !showAttrs;
  document.querySelectorAll('.entity-attrs').forEach(el => {
    el.style.display = showAttrs ? '' : 'none';
  });
  document.getElementById('btn-attrs').textContent = showAttrs ? 'Ocultar atributos' : 'Mostrar atributos';
  drawArrows();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
buildEntities();
buildRelNodes();

if (!loadSavedLayout()) {
  panX = 80; panY = 20;
  applyTransform();
  drawArrows();
}

// Click outside clears selection
document.getElementById('canvas').addEventListener('click', e => {
  if (e.target === canvas || e.target.id === 'world') clearSelection();
});
</script>
